name: Playwright CI

on:
  push:
    branches: [master, Varun]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      test_file:
        description: 'Specific test file to run (e.g. tests/e2e/google-search.spec.js)'
        required: false
        default: ''
      headed:
        description: 'Run in headed mode (requires display)'
        type: boolean
        default: false
      project:
        description: 'Project to run (chromium, mobile-chrome, mobile-safari)'
        required: false
        default: 'chromium'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', github.event.inputs.project)) || fromJSON('["chromium", "mobile-chrome", "mobile-safari"]') }}
    name: ${{ matrix.project }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install xvfb (headed mode support)
        if: ${{ github.event.inputs.headed == 'true' }}
        run: sudo apt-get install -y xvfb

      - name: Run Playwright tests (${{ matrix.project }})
        run: >
          ${{ github.event.inputs.headed == 'true' && 'xvfb-run --auto-servernum' || '' }}
          npx playwright test
          --project=${{ matrix.project }}
          ${{ github.event.inputs.headed == 'true' && '--headed' || '' }}
          ${{ github.event.inputs.test_file || '' }}
        env:
          BASE_URL: https://eventhub.rahulshettyacademy.com

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-${{ matrix.project }}
          path: test-results/
          retention-days: 7
